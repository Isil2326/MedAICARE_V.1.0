name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MedAICare_V.3_10Patients
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MedAICare_V.3_10Patients/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
