<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="dropGrad" x1="38" y1="5" x2="62" y2="90"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6B1010"/>
      <stop offset="40%"  stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Anneau 3 — le plus grand -->
  <ellipse cx="50" cy="84" rx="44" ry="10.5"
    stroke="#DC2626" stroke-width="3.5" fill="none"/>

  <!-- Anneau 2 -->
  <ellipse cx="50" cy="84" rx="33" ry="7.5"
    stroke="#DC2626" stroke-width="3.5" fill="none"/>

  <!-- Anneau 1 — le plus proche de la goutte -->
  <ellipse cx="50" cy="84" rx="21" ry="4.5"
    stroke="#DC2626" stroke-width="3.0" fill="none"/>

  <!-- Goutte — même forme que la référence -->
  <path
    d="M 50 6
       C 30 26 27 50 27 66
       A 23 23 0 1 0 73 66
       C 73 50 70 26 50 6 Z"
    fill="url(#dropGrad)"
  />

  <!-- Reflet en croissant (bas-droite intérieur) -->
  <path
    d="M 58 32
       C 70 44 70 62 63 74
       C 57 80 48 76 45 69
       C 53 73 65 58 63 41
       C 62 35 59 29 58 32 Z"
    fill="white"
    opacity="0.80"
  />
</svg>
