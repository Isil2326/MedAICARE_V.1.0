<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Dégradé rouge sang : bordeaux profond → rouge vif -->
    <linearGradient id="dropRed" x1="50" y1="5" x2="50" y2="88"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6B1010"/>
      <stop offset="35%"  stop-color="#B91C1C"/>
      <stop offset="80%"  stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Ombre douce sous la goutte -->
    <filter id="shadow" x="-20%" y="-10%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5"
        flood-color="#7F1D1D" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- ── ANNEAUX DE RIPPLE concentriques (dessinés derrière la goutte) ──
       3 bandes elliptiques horizontales — rouge décroissant vers l'extérieur -->

  <!-- Anneau 3 (le plus grand, le plus clair) -->
  <ellipse cx="50" cy="88" rx="46" ry="11" fill="#FCA5A5" opacity="0.50"/>
  <ellipse cx="50" cy="88" rx="38" ry="7"  fill="white"/>

  <!-- Anneau 2 -->
  <ellipse cx="50" cy="88" rx="32" ry="8"  fill="#EF4444" opacity="0.68"/>
  <ellipse cx="50" cy="88" rx="25" ry="4.5" fill="white"/>

  <!-- Anneau 1 (le plus proche de la goutte, le plus intense) -->
  <ellipse cx="50" cy="88" rx="22" ry="5.5" fill="#DC2626" opacity="0.85"/>
  <ellipse cx="50" cy="88" rx="15" ry="3"   fill="white"/>

  <!-- ── GOUTTE REMPLIE — forme organique identique à la référence ──
       Tip en haut (50, 6) · cercle centre (50, 66) r=22 · base (50, 88) -->
  <path
    d="M 50 6
       C 30 26 27 50 27 66
       A 23 23 0 1 0 73 66
       C 73 50 70 26 50 6 Z"
    fill="url(#dropRed)"
    filter="url(#shadow)"
  />

  <!-- ── REFLET EN CROISSANT — identique à la référence
       Épaisse forme blanche sur le bas-droite de l'intérieur de la goutte -->
  <path
    d="M 58 32
       C 70 44 70 62 63 74
       C 57 80 48 76 45 69
       C 53 73 65 58 63 41
       C 62 35 59 29 58 32 Z"
    fill="white"
    opacity="0.82"
  />
</svg>
