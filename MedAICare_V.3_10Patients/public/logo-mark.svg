<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#34D399"/>
      <stop offset="55%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Ambient light overlay (premium feel) -->
  <rect width="100" height="100" rx="22"
    fill="url(#shine)" opacity="0.12"/>
  <defs>
    <radialGradient id="shine" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─────────────────────────────────────────
       WATER DROP  — mathematically precise
       Circle center (54, 64) radius 27
       Tip at (54, 8)  Leftmost (27, 64)  Rightmost (81, 64)
  ───────────────────────────────────────── -->
  <path
    d="M 54 8
       C 69 29  81 46  81 64
       A 27 27  0 1 1  27 64
       C 27 46  39 29  54 8 Z"
    stroke="white" stroke-width="5" stroke-linejoin="round"
  />

  <!-- ─────────────────────────────────────────
       STETHOSCOPE  — compact, hugging left edge
  ───────────────────────────────────────── -->

  <!-- Binaural spring  (U-arch, upper-left, fully outside the drop) -->
  <path d="M 6 36 C 6 15 24 15 24 36"
    stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Ear tips -->
  <circle cx="6"  cy="37" r="2.8" fill="white"/>
  <circle cx="24" cy="36" r="2.8" fill="white"/>

  <!-- Single tube curving down to chest piece -->
  <path d="M 24 39.5 C 23 51 22 57 22 62"
    stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Chest piece — ring overlapping lower-left curve of drop -->
  <circle cx="22" cy="71" r="9"   stroke="white" stroke-width="4.5"/>
  <circle cx="22" cy="71" r="3.2" fill="white"/>

  <!-- ─────────────────────────────────────────
       DROP HIGHLIGHT — interior reflection curl
       (subtle gloss, like Glucose app)
  ───────────────────────────────────────── -->
  <path d="M 63 23 C 65 32 66 42 65 50"
    stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.4"/>
</svg>
