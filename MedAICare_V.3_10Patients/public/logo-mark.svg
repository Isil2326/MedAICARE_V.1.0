<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0EA5E9"/>
      <stop offset="52%"  stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Rounded background (iOS-icon style) -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ── WATER DROP ── (white stroke outline, point-top teardrop, slightly right-of-center) -->
  <path
    d="M 63 9
       C 63 9   91 37   91 60
       A 28 28  0 0 1   35 60
       C 35 37  63 9    63 9 Z"
    stroke="white" stroke-width="5.5" stroke-linejoin="round"
  />

  <!-- Reflection curl inside drop (lower-left interior, like Glucose app reference) -->
  <path d="M 48 53 Q 45 60 49 68"
    stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- ── STETHOSCOPE ── (white, hugging the LEFT side of the drop) -->

  <!-- Binaural spring arch (U-shape, upper-left area) -->
  <path d="M 9 36 C 9 16 34 16 34 36"
    stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Left ear tip -->
  <circle cx="9"  cy="37" r="4" fill="white"/>
  <!-- Right ear tip -->
  <circle cx="34" cy="37" r="4" fill="white"/>

  <!-- Tube: right ear tip → curves down → meets diaphragm -->
  <path d="M 34 41 C 36 56 40 64 41 71"
    stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Chest piece ring (diaphragm) — overlapping bottom-left edge of drop -->
  <circle cx="41" cy="80" r="9.5" stroke="white" stroke-width="5.5"/>

  <!-- Chest piece membrane center dot -->
  <circle cx="41" cy="80" r="3.5" fill="white"/>
</svg>
