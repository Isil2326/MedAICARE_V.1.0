<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 112" fill="none">
  <!-- Water drop: point at top, perfect teardrop bottom circle -->
  <path d="M50 4 C50 4 91 47 91 71 C91 93.6 72.6 110 50 110 C27.4 110 9 93.6 9 71 C9 47 50 4 50 4 Z" fill="#1B5FC1"/>

  <!-- Left ear tip -->
  <circle cx="32" cy="38" r="4" fill="white"/>
  <!-- Right ear tip -->
  <circle cx="68" cy="38" r="4" fill="white"/>

  <!-- Left binaural tube: ear tip → Y-junction -->
  <path d="M32 42 C32 57 44 62 50 63.5"
        stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Right binaural tube: ear tip → Y-junction -->
  <path d="M68 42 C68 57 56 62 50 63.5"
        stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Stem: junction → diaphragm -->
  <line x1="50" y1="63.5" x2="50" y2="79.5"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Diaphragm ring (chest piece) -->
  <circle cx="50" cy="89" r="10.5" stroke="white" stroke-width="4.5" fill="none"/>
  <!-- Diaphragm membrane dot -->
  <circle cx="50" cy="89" r="4" fill="white"/>
</svg>
