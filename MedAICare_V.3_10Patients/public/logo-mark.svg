<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Rounded icon background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ── HEART (white outline stroke, centered) ── -->
  <path
    d="M 50 77
       C 32 62  18 52  18 35
       C 18 20  27 12  36 12
       C 42 12  47 16  50 22
       C 53 16  58 12  64 12
       C 73 12  82 20  82 35
       C 82 52  68 62  50 77 Z"
    stroke="white" stroke-width="5.5" stroke-linejoin="round"
  />

  <!-- ── STETHOSCOPE (white, left side of heart) ── -->

  <!-- Binaural spring arch — upper-left, clearly outside the heart -->
  <path d="M 7 33 C 7 8 27 8 27 33"
    stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Left ear tip -->
  <circle cx="7"  cy="34" r="3.5" fill="white"/>
  <!-- Right ear tip -->
  <circle cx="27" cy="34" r="3.5" fill="white"/>

  <!-- Tube: from right earpiece curving gently down → top of chest piece -->
  <path d="M 27 37.5 C 27 44 29 49 30 51"
    stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Chest piece ring — overlapping lower-left curve of heart -->
  <circle cx="30" cy="62" r="11" stroke="white" stroke-width="5.5"/>

  <!-- Chest piece membrane center dot -->
  <circle cx="30" cy="62" r="4" fill="white"/>
</svg>
